<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Certificate Not Found</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f0f2ff;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; color: #212121;
    }
    .box {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 4px 24px rgba(0,0,0,.1);
      padding: 3rem 3.5rem;
      text-align: center;
      max-width: 440px;
    }
    .icon  { font-size: 3.5rem; margin-bottom: 1rem; }
    h1     { color: #c62828; font-size: 1.5rem; margin-bottom: .5rem; }
    p      { color: #757575; font-size: .95rem; line-height: 1.6; }
    .sub   { margin-top: 1.5rem; font-size: .82rem; color: #bdbdbd; }
  </style>
</head>
<body>
<div class="box">
  <div class="icon">🔍</div>
  <h1>Certificate Not Found</h1>
  <p>The certificate ID in this QR code does not match any record in our system.</p>
  <p class="sub">SmartPrep AI – Certificate Verification System</p>
</div>
</body>
</html>
