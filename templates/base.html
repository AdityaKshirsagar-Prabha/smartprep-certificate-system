<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}SmartPrep AI{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:   #1a237e;
      --accent:    #3949ab;
      --light-bg:  #f0f2ff;
      --surface:   #ffffff;
      --text:      #212121;
      --muted:     #757575;
      --success:   #2e7d32;
      --error:     #c62828;
      --radius:    10px;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--light-bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Navbar ── */
    nav {
      background: var(--primary);
      color: #fff;
      padding: 0 2rem;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,.25);
    }
    nav .brand { font-size: 1.15rem; font-weight: 700; letter-spacing: .5px; }
    nav .brand span { color: #7986cb; }
    nav .nav-links a {
      color: #c5cae9;
      text-decoration: none;
      margin-left: 1.5rem;
      font-size: .9rem;
      transition: color .2s;
    }
    nav .nav-links a:hover { color: #fff; }

    /* ── Flash messages ── */
    .flashes { padding: 0 2rem; margin-top: 1rem; }
    .flash {
      padding: .75rem 1rem;
      border-radius: var(--radius);
      margin-bottom: .5rem;
      font-size: .9rem;
    }
    .flash.success { background: #e8f5e9; color: var(--success); border-left: 4px solid var(--success); }
    .flash.error   { background: #ffebee; color: var(--error);   border-left: 4px solid var(--error); }

    /* ── Container ── */
    .container { max-width: 1100px; margin: 2rem auto; padding: 0 2rem; }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: 0 2px 12px rgba(0,0,0,.08);
      padding: 2rem;
      margin-bottom: 2rem;
    }
    .card h2 { color: var(--primary); margin-bottom: 1.25rem; font-size: 1.3rem; }

    /* ── Buttons ── */
    .btn {
      display: inline-block;
      padding: .6rem 1.4rem;
      border-radius: var(--radius);
      border: none;
      cursor: pointer;
      font-size: .9rem;
      font-weight: 600;
      text-decoration: none;
      transition: opacity .2s, transform .1s;
    }
    .btn:active { transform: scale(.97); }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-accent  { background: var(--accent);  color: #fff; }
    .btn-sm      { padding: .35rem .9rem; font-size: .8rem; }
    .btn:hover   { opacity: .88; }

    /* ── Forms ── */
    .form-group { margin-bottom: 1.1rem; }
    label { display: block; font-size: .85rem; font-weight: 600; color: var(--muted); margin-bottom: .35rem; }
    input[type=text], input[type=password], input[type=date], input[type=file], select {
      width: 100%;
      padding: .6rem .85rem;
      border: 1.5px solid #c5cae9;
      border-radius: 7px;
      font-size: .95rem;
      color: var(--text);
      transition: border-color .2s;
      background: #fafafa;
    }
    input:focus { outline: none; border-color: var(--accent); background: #fff; }
    input[type=file] { padding: .45rem; cursor: pointer; }

    /* ── Table ── */
    table { width: 100%; border-collapse: collapse; font-size: .88rem; }
    th { background: var(--primary); color: #fff; padding: .7rem 1rem; text-align: left; }
    td { padding: .65rem 1rem; border-bottom: 1px solid #e8eaf6; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f5f5f5; }
    .badge {
      display: inline-block;
      background: #e8eaf6;
      color: var(--primary);
      padding: .2rem .55rem;
      border-radius: 20px;
      font-size: .75rem;
      font-weight: 700;
      letter-spacing: .5px;
    }

    /* ── QR thumb ── */
    .qr-thumb {
      width: 60px; height: 60px;
      object-fit: contain;
      border-radius: 6px;
      border: 1px solid #e8eaf6;
      cursor: pointer;
    }

    /* ── Page header ── */
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }
    .page-header h1 { font-size: 1.5rem; color: var(--primary); }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>

<nav>
  <div class="brand">SmartPrep <span>AI</span> – Certificate System</div>
  <div class="nav-links">
    <a href="{{ url_for('admin_dashboard') }}">Dashboard</a>
    <a href="{{ url_for('add_certificate') }}">+ Add</a>
    <a href="{{ url_for('admin_logout') }}">Logout</a>
  </div>
</nav>

{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    <div class="flashes">
      {% for cat, msg in messages %}
        <div class="flash {{ cat }}">{{ msg }}</div>
      {% endfor %}
    </div>
  {% endif %}
{% endwith %}

<div class="container">
  {% block content %}{% endblock %}
</div>

</body>
</html>
