<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Certificate – {{ cert.student_name }}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    /* ── Verification strip (subtle, NPTEL-style) ── */
    .verify-strip {
      position: fixed;
      top: 0; left: 0; right: 0;
      background: #1a237e;
      color: #c5cae9;
      font-size: .75rem;
      text-align: center;
      padding: .4rem 1rem;
      letter-spacing: .4px;
      z-index: 10;
    }
    .verify-strip strong { color: #fff; }

    /* ── Certificate image ── */
    .cert-wrapper {
      margin-top: 38px;          /* height of strip */
      width: 100%;
      max-width: 960px;
      padding: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .cert-wrapper img {
      width: 100%;
      height: auto;
      max-height: calc(100vh - 80px);
      object-fit: contain;
      border-radius: 6px;
      box-shadow: 0 8px 40px rgba(0,0,0,.5);
    }

    /* PDF embed fallback */
    .cert-wrapper embed {
      width: 100%;
      height: calc(100vh - 80px);
      border-radius: 6px;
    }

    /* ── Valid badge ── */
    .valid-dot {
      display: inline-block;
      width: 8px; height: 8px;
      background: #69f0ae;
      border-radius: 50%;
      margin-right: 5px;
      vertical-align: middle;
    }
  </style>
</head>
<body>



<div class="cert-wrapper">
  {% set ext = cert.image_path.rsplit('.', 1)[-1].lower() %}
  {% if ext == 'pdf' %}
    <embed src="{{ url_for('static', filename=cert.image_path) }}" type="application/pdf" />
  {% else %}
    <img src="{{ url_for('static', filename=cert.image_path) }}"
         alt="Certificate of {{ cert.student_name }}" />
  {% endif %}
</div>

</body>
</html>
