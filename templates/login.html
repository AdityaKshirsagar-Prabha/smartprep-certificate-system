<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login – SmartPrep AI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #1a237e 0%, #3949ab 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: #fff;
      border-radius: 14px;
      padding: 2.5rem 2.8rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,.3);
    }
    .logo { text-align: center; margin-bottom: 1.8rem; }
    .logo h1 { font-size: 1.6rem; color: #1a237e; font-weight: 800; }
    .logo p  { color: #757575; font-size: .85rem; margin-top: .3rem; }
    label { display: block; font-size: .82rem; font-weight: 600; color: #555; margin-bottom: .35rem; }
    input {
      width: 100%; padding: .65rem .9rem;
      border: 1.5px solid #c5cae9; border-radius: 8px;
      font-size: .95rem; color: #212121;
      margin-bottom: 1rem; background: #fafafa;
      transition: border-color .2s;
    }
    input:focus { outline: none; border-color: #3949ab; background: #fff; }
    .btn {
      width: 100%; padding: .75rem;
      background: #1a237e; color: #fff;
      border: none; border-radius: 8px;
      font-size: 1rem; font-weight: 700;
      cursor: pointer; margin-top: .5rem;
      transition: opacity .2s;
    }
    .btn:hover { opacity: .88; }
    .error-msg {
      background: #ffebee; color: #c62828;
      border-left: 4px solid #c62828;
      padding: .65rem .9rem; border-radius: 7px;
      font-size: .88rem; margin-bottom: 1rem;
    }
  </style>
</head>
<body>
<div class="login-card">
  <div class="logo">
    <h1>SmartPrep AI</h1>
    <p>Certificate Verification System</p>
  </div>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="error-msg">{{ msg }}</div>
    {% endfor %}
  {% endwith %}

  <form method="POST">
    <label for="username">Username</label>
    <input type="text" id="username" name="username" required autofocus placeholder="admin" />

    <label for="password">Password</label>
    <input type="password" id="password" name="password" required placeholder="••••••••" />

    <button type="submit" class="btn">Sign In →</button>
  </form>
</div>
</body>
</html>
